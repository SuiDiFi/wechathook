# 本地模拟「云端 bot-server + 管理后台」联调
# 用法: docker compose -f deploy/docker-compose.yml up --build
# 本地等效: pnpm start:server & pnpm start:admin

services:
  bot-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.bot-server
    ports:
      - "8788:8788"
    environment:
      BOT_SERVER_PORT: "8788"
      CONFIG_PATH: config/bot.yaml
    volumes:
      - ../config:/app/config:ro
      - ../data:/app/data
      - ../reference:/app/reference:ro

  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    ports:
      - "8790:8790"
    environment:
      BOT_SERVER_URL: http://bot-server:8788
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-change-me}
    depends_on:
      - bot-server
    volumes:
      - ../config:/app/config
