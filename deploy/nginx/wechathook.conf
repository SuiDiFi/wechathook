# Nginx 反代 — 泛解析 sc5.top 下建议子域名
# 安装：deploy/scripts/cloud-bootstrap.sh 会复制到 /etc/nginx/sites-available/

# bot-server（本地 gateway / relay-bridge 调用 /super/*）
server {
    listen 80;
    server_name bot.sc5.top;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# admin（萌兔总代 /agent + 总控 /console）
server {
    listen 80;
    server_name admin.sc5.top;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
