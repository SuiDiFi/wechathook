# Nginx 反代 — 域名规范见 docs/development/domain-convention.md
# bot.*  = 总代 UI | admin.* = 总控 UI | api.* = bot-server 引擎

# api — bot-server（/super/*、/health，给程序调用）
server {
    listen 80;
    server_name api.sc5.top;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# bot — admin 总代入口（萌兔 /agent）
server {
    listen 80;
    server_name bot.sc5.top;

    client_max_body_size 20m;

    location = / {
        return 302 /agent/;
    }

    location / {
        proxy_pass http://127.0.0.1:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# admin — admin 官方总控（/console）
server {
    listen 80;
    server_name admin.sc5.top;

    client_max_body_size 20m;

    location = / {
        return 302 /console/;
    }

    location / {
        proxy_pass http://127.0.0.1:8790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
