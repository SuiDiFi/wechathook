<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,viewport-fit=cover" />
  <title>wechathook 官方总控后台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" />
  <link rel="stylesheet" href="/console/console.css?v=7" />
</head>
<body>
  <div id="page-login" class="page-login">
    <div class="login-card">
      <div class="login-logo"><i class="ri-shield-keyhole-line"></i></div>
      <h1 class="login-title">官方总控后台</h1>
      <p class="login-sub">wechathook · 管控总代理个人后台</p>
      <div class="form-field">
        <i class="ri-user-line"></i>
        <input id="inp-user" type="text" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-field">
        <i class="ri-lock-line"></i>
        <input id="inp-pass" type="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>
      <button type="button" class="btn-primary" id="btn-login">登 录</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>

  <div id="page-app" class="page-app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="ri-shield-keyhole-line"></i></div>
        <div>
          <div class="brand-title">官方总控</div>
          <div class="brand-sub">wechathook</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <button type="button" class="nav-item active" data-tab="dash"><i class="ri-dashboard-line"></i><span>概览</span></button>
        <button type="button" class="nav-item" data-tab="agent"><i class="ri-user-settings-line"></i><span>总代</span></button>
        <button type="button" class="nav-item" data-tab="resource"><i class="ri-database-2-line"></i><span>资源</span></button>
        <button type="button" class="nav-item" data-tab="menu"><i class="ri-menu-line"></i><span>菜单</span></button>
        <button type="button" class="nav-item" data-tab="groups"><i class="ri-group-line"></i><span>群</span></button>
      </nav>
      <a class="sidebar-link" href="/agent/" target="_blank" rel="noopener"><i class="ri-external-link-line"></i> 预览总代后台</a>
    </aside>
    <main class="main-area">
      <div id="view-root"></div>
    </main>
    <nav class="tabbar tabbar--mobile" id="tabbar">
      <button type="button" class="tabbar-item active" data-tab="dash"><i class="ri-dashboard-line"></i><span>概览</span></button>
      <button type="button" class="tabbar-item" data-tab="agent"><i class="ri-user-settings-line"></i><span>总代</span></button>
      <button type="button" class="tabbar-item" data-tab="resource"><i class="ri-database-2-line"></i><span>资源</span></button>
      <button type="button" class="tabbar-item" data-tab="menu"><i class="ri-menu-line"></i><span>菜单</span></button>
      <button type="button" class="tabbar-item" data-tab="groups"><i class="ri-group-line"></i><span>群</span></button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/console/app.js?v=17"></script>
</body>
</html>
